aid: curtiss-wright
name: Curtiss-Wright
description: >-
  Curtiss-Wright is a global integrated business that provides highly engineered
  products, solutions, and services mainly to the aerospace, defense, commercial
  power, process, and general industrial markets. Its product portfolio spans rugged
  embedded computing, mission-critical avionics, electronic packaging, naval propulsion,
  reactor coolant pumps for nuclear power, surface treatment services, industrial
  valves, sensors, data acquisition systems, telemetry ground stations, emergency
  arresting systems for military aircraft, and electronic systems for naval shipbuilding
  programs. The company traces its lineage to the aviation pioneers Glenn Curtiss
  and the Wright brothers and today operates across the Defense Electronics, Naval
  & Power, and Aerospace & Industrial segments.
